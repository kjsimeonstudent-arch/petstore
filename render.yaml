services:

  # ============================================================================
  # BACKEND SERVICE (Spring Boot / Java 17)
  # ============================================================================
  - type: web
    name: petstore-backend

    # Runtime environment for Spring Boot
    runtime: java

    # Command to build the backend application
    buildCommand: cd backend && ./mvnw clean package -DskipTests

    # Command to start the Spring Boot JAR
    startCommand: cd backend && java -jar target/*.jar

    # Free Render instance
    plan: free

    envVars:

      # ------------------------------------------------------------------------
      # DATABASE CONFIGURATION
      # Replace these values with your external PostgreSQL credentials
      # ------------------------------------------------------------------------
      - key: DB_HOST
        value: YOUR_DB_HOST

      - key: DB_PORT
        value: YOUR_DB_PORT

      - key: DB_NAME
        value: YOUR_DB_NAME

      - key: DATABASE_USERNAME
        value: YOUR_DB_USERNAME

      - key: DATABASE_PASSWORD
        value: YOUR_DB_PASSWORD

      # SSL mode for PostgreSQL connection
      - key: DB_SSL_MODE
        value: require

      # ------------------------------------------------------------------------
      # BACKEND SERVER CONFIGURATION
      # ------------------------------------------------------------------------
      - key: PORT
        value: "8080"

      # URL of your frontend application
      - key: CORS_ALLOWED_ORIGINS
        value: https://YOUR-FRONTEND-URL.onrender.com


  # ============================================================================
  # FRONTEND SERVICE (Vite / React)
  # ============================================================================
  - type: web
    name: petstore-frontend

    # Static frontend hosting
    runtime: static

    # Build frontend files
    buildCommand: cd frontend && npm install && npm run build

    # Folder generated after build
    staticPublishPath: frontend/dist

    # React/Vue SPA routing support
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:

      # ------------------------------------------------------------------------
      # FRONTEND API CONFIGURATION
      # URL of your deployed backend API
      # ------------------------------------------------------------------------
      - key: VITE_API_BASE_URL
        value: https://YOUR-BACKEND-URL.onrender.com
