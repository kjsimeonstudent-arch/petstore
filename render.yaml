services:
  - type: web
    name: petstore-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: petstore-backend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: petstore-backend
    plan: free
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: petstore-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: petstore-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: petstore-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: petstore-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: petstore-db
          property: password
      - key: DB_SSL_MODE
        value: require
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: petstore-frontend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: petstore-db
    plan: free
    databaseName: petstore
    user: petstore
