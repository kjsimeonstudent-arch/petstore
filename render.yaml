services:
  # PostgreSQL Database
  - type: pserv
    name: petstore-db
    plan: free
    # Database will be created with default settings
    # Connection details provided via environment variables

  # Backend API Service
  - type: web
    name: petstore-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: petstore-db
          property: connectionString
      - key: DB_HOST
        fromService:
          type: pserv
          name: petstore-db
          property: host
      - key: DB_PORT
        fromService:
          type: pserv
          name: petstore-db
          property: port
      - key: DB_NAME
        value: postgres
      - key: DB_USERNAME
        fromService:
          type: pserv
          name: petstore-db
          property: username
      - key: DB_PASSWORD
        fromService:
          type: pserv
          name: petstore-db
          property: password
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: petstore-frontend
          property: host
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: 8080
    healthCheckPath: /actuator/health

  # Frontend Web App
  - type: web
    name: petstore-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: petstore-backend
          property: host
    routes:
      - type: rewrite
        source: /api/(.*)
        destination: /api/$1