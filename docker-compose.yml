version: '3.9'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: petstore
      POSTGRES_USER: petstore
      POSTGRES_PASSWORD: petstore
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/petstore
      SPRING_DATASOURCE_USERNAME: petstore
      SPRING_DATASOURCE_PASSWORD: petstore
    depends_on:
      - postgres
    ports:
      - '8080:8080'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  postgres-data:
